   <form action="">

     <label for="firstDigit"> First Digit</label>
    <input type="number" id="firstDigit" name="firstDigit">

    <label for="secondDigit">Second Digit</label>
    <input type="number" id="secondDigit" name="secondDigit">

    <button type="submit">Add</button>

    <p>Answer: <span id="answer"></span></p>
    </form>
    </div>



<script>
let a = document.getElementById('firstDigit');
let b = document.getElementById('secondDigit');

document.querySelector('form').addEventListener('submit', function(e) {
  e.preventDefault();
  let sum = parseInt(a.value) + parseInt(b.value);
  document.getElementById('answer').textContent =
  sum;
});

    </script>
